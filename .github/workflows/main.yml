name: Update DNS Blocklists

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blocklist-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache massdns
        id: cache-massdns
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/massdns
          key: massdns-v1-linux

      - name: Build massdns
        if: steps.cache-massdns.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y --no-install-recommends build-essential
          git clone --depth 1 https://github.com/blechschmidt/massdns /tmp/massdns
          make -C /tmp/massdns -j$(nproc)
          sudo mv /tmp/massdns/bin/massdns /usr/local/bin/massdns

      - name: Run
        run: |
          BLOCK_OUT="blocklists.txt"
          BLOCK_TMP="blocklists.tmp"
          RESOLVERS_FILE="resolvers.tmp"

          printf '%s\n' \
            1.1.1.1 1.0.0.1 \
            8.8.8.8 8.8.4.4 \
            9.9.9.9 149.112.112.112 \
            208.67.222.222 208.67.220.220 \
            94.140.14.14 94.140.15.15 \
          > "$RESOLVERS_FILE"

          echo "Downloading..."
          curl -fsSL --max-time 90 --parallel --parallel-immediate \
            https://adguardteam.github.io/HostlistsRegistry/assets/filter_16.txt \
            https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt \
            https://raw.githubusercontent.com/bibicadotnet/AdGuard-Home-blocklists/refs/heads/main/byme.txt \
            https://raw.githubusercontent.com/VeleSila/yhosts/master/hosts \
            https://badmojr.github.io/1Hosts/Lite/adblock.txt \
          | awk '{
              if (/^[[:space:]]*$/ || /^[!#;]/) next
              line = tolower($0)
              sub(/^@@\|\|?/, "", line); sub(/^\|\|?/, "", line)
              sub(/\^.*/, "", line);     sub(/[#!].*/, "", line)
              sub(/\/.*/, "", line);     sub(/:.*/, "", line)
              sub(/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+[[:space:]]+/, "", line)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
              if (line ~ /^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$/ && !seen[line]++) print line
            }' | sort -u > "$BLOCK_TMP"

          TOTAL=$(wc -l < "$BLOCK_TMP")
          echo "Total: $TOTAL"

          massdns -r "$RESOLVERS_FILE" -t A -o S -q "$BLOCK_TMP" \
          | awk '{
              if ($2 == "A" && $3 !~ /^(0\.0\.0\.0|127\.)/) {
                sub(/\.$/, "", $1)
                if (!seen[$1]++) print $1
              }
            }' | sort -u > "$BLOCK_OUT"

          VALID=$(wc -l < "$BLOCK_OUT")
          echo "Valid: $VALID / $TOTAL"
          rm -f "$BLOCK_TMP" "$RESOLVERS_FILE"

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update blocklists [skip ci]"
          file_pattern: 'blocklists.txt'
